<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Order Online</title>
<style>
:root {
  --bg: #0f0f1a;
  --bg2: #1a1a2e;
  --bg3: #16213e;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --accent: #ff6b35;
  --accent-lt: rgba(255,107,53,0.15);
  --success: #00d4aa;
  --text: #ffffff;
  --text2: #a0a0b0;
  --text3: #6c6c80;
  --radius: 16px;
  --radius-sm: 10px;
  --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;overflow-x:hidden}
 
/* ── TOP BAR ── */
.top-bar{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px)}
.top-bar .brand{font-size:1.1rem;font-weight:900;background:linear-gradient(90deg,#ff6b35,#ff8555);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-bar .subtext{font-size:0.72rem;color:var(--text2);margin-top:1px}
.cart-pill{display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:24px;padding:8px 14px;font-size:0.82rem;font-weight:700;cursor:pointer;transition:var(--transition)}
.cart-pill:active{transform:scale(0.96)}
.cart-pill .count{background:rgba(255,255,255,0.25);border-radius:12px;padding:1px 7px;font-size:0.72rem}
 
/* ── CATEGORIES ── */
.cat-row{position:sticky;top:57px;z-index:90;background:var(--bg);display:flex;gap:8px;overflow-x:auto;padding:10px 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--border)}
.cat-row::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:24px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:0.8rem;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap}
.cat-chip.active{border-color:var(--accent);background:var(--accent-lt);color:var(--accent)}
 
/* ── SEARCH ── */
.search-wrap{padding:0 16px 12px}
.search-wrap input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:0.9rem;outline:none;transition:var(--transition)}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text3)}
 
/* ── MENU GRID ── */
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 12px 120px}
@media(min-width:500px){.menu-grid{grid-template-columns:repeat(3,1fr)}}
 
.food-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:var(--transition)}
.food-card.in-cart{border-color:var(--accent)}
.food-card:active{transform:scale(0.97)}
.card-img{width:100%;height:90px;object-fit:cover;display:block;background:var(--bg3)}
.card-img-ph{width:100%;height:90px;background:linear-gradient(135deg,var(--bg3),var(--bg2));display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.card-body{padding:8px 10px 6px}
.card-name{font-size:0.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.card-price{font-size:0.85rem;font-weight:700;color:var(--accent)}
.card-qty{display:flex;align-items:center;justify-content:space-between;padding:6px 8px 8px;border-top:1px solid var(--border);background:var(--bg3)}
.qty-btn{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:1.1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.qty-btn.minus{color:#ff3366;border-color:rgba(255,51,102,0.3)}
.qty-btn.plus{color:var(--accent);border-color:rgba(255,107,53,0.3)}
.qty-num{font-size:0.9rem;font-weight:800;min-width:22px;text-align:center}
 
.section-title{padding:6px 16px 4px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3)}
 
/* ── EMPTY STATE ── */
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;color:var(--text3);text-align:center;gap:8px}
.empty .e-icon{font-size:3rem;opacity:0.5}
 
/* ── CART DRAWER ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--bg2);border-radius:24px 24px 0 0;max-height:85vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1)}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 0}
.drawer-header{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.drawer-header h2{font-size:1rem;font-weight:700}
.drawer-close{background:none;border:none;color:var(--text2);font-size:1.4rem;cursor:pointer;padding:2px 6px}
.drawer-body{overflow-y:auto;flex:1;padding:10px 16px}
 
.cart-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.cart-row:last-child{border-bottom:none}
.cart-thumb{width:44px;height:44px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;overflow:hidden}
.cart-thumb img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.cart-info{flex:1;min-width:0}
.cart-name{font-size:0.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-price{font-size:0.78rem;color:var(--text2);margin-top:2px}
.cart-adj{display:flex;align-items:center;gap:6px}
.cadj-btn{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cadj-btn.minus{color:#ff3366}
.cadj-btn.plus{color:var(--accent)}
.cadj-num{font-size:0.88rem;font-weight:800;min-width:20px;text-align:center}
 
.total-bar{padding:12px 16px;border-top:1px solid var(--border)}
.total-row{display:flex;justify-content:space-between;font-size:0.88rem;color:var(--text2);margin-bottom:4px}
.total-row.grand{font-size:1rem;font-weight:700;color:var(--text)}
 
/* ── CUSTOMER FORM ── */
.form-section{padding:14px 16px;border-top:1px solid var(--border)}
.form-section h3{font-size:0.82rem;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.06em}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:0.72rem;color:var(--text3);font-weight:600}
.form-field input,.form-field textarea{background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:0.88rem;padding:8px 10px;outline:none;font-family:inherit;resize:none;transition:border-color 0.2s}
.form-field input:focus,.form-field textarea:focus{border-color:var(--accent)}
 
.place-btn{width:100%;padding:14px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:var(--transition);box-shadow:0 4px 16px rgba(255,107,53,0.35)}
.place-btn:active{transform:scale(0.98)}
.place-btn:disabled{opacity:0.5;cursor:not-allowed}
.drawer-footer{flex-shrink:0;padding:14px 16px;border-top:1px solid var(--border);background:var(--bg2)}
 
/* ── SUCCESS SCREEN ── */
.success-screen{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;opacity:0;pointer-events:none;transition:opacity 0.4s}
.success-screen.show{opacity:1;pointer-events:auto}
.success-icon{font-size:5rem;margin-bottom:1.5rem;animation:popIn 0.5s cubic-bezier(0.17,0.89,0.32,1.28) forwards}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.success-screen h1{font-size:1.6rem;font-weight:900;margin-bottom:0.5rem;background:linear-gradient(90deg,var(--success),#00f0c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.success-screen p{color:var(--text2);font-size:0.92rem;margin-bottom:0.5rem}
.success-screen .order-id{font-family:monospace;font-size:1.2rem;font-weight:700;color:var(--accent);padding:8px 20px;background:var(--accent-lt);border-radius:8px;margin:12px 0}
.new-order-btn{margin-top:1.5rem;padding:12px 32px;border-radius:var(--radius-sm);border:2px solid var(--accent);background:transparent;color:var(--accent);font-size:0.95rem;font-weight:700;cursor:pointer;transition:var(--transition)}
.new-order-btn:hover{background:var(--accent-lt)}

/* ── TABLE PICKER ── */
.table-picker-wrap{margin-bottom:14px}
.table-picker-label{font-size:0.72rem;color:var(--text3);font-weight:600;margin-bottom:8px;display:block}
.table-grid-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.tbl-btn{padding:8px 4px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:0.78rem;font-weight:700;cursor:pointer;text-align:center;transition:var(--transition)}
.tbl-btn:active{transform:scale(0.94)}
.tbl-btn.selected{border-color:var(--accent);background:var(--accent-lt);color:var(--accent)}
.tbl-takeaway{grid-column:1/-1;padding:9px;font-size:0.82rem;margin-top:2px}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
 
<!-- TOP BAR -->
<div class="top-bar">
  <div>
    <div class="brand" id="brand-name">Loading…</div>
    <div class="subtext">Tap items to add to cart</div>
  </div>
  <button class="cart-pill" id="cart-btn" onclick="openCart()">
    🛒 Cart <span class="count" id="cart-count">0</span>
  </button>
</div>
 
<!-- CATEGORIES -->
<div class="cat-row" id="cat-row"></div>
 
<!-- SEARCH -->
<div class="search-wrap">
  <input type="search" id="search-input" placeholder="🔍 Search menu…" oninput="renderMenu()">
</div>
 
<!-- SECTION TITLE -->
<div class="section-title" id="section-title">All Items</div>
 
<!-- MENU GRID -->
<div class="menu-grid" id="menu-grid"></div>
 
<!-- CART DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeCart()"></div>
 
<!-- CART DRAWER -->
<div class="drawer" id="cart-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <h2>🛒 Your Order</h2>
    <button class="drawer-close" onclick="closeCart()">×</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer" id="drawer-footer" style="display:none"></div>
</div>
 
<!-- SUCCESS SCREEN -->
<div class="success-screen" id="success-screen">
  <div class="success-icon">✅</div>
  <h1>Order Placed!</h1>
  <p>Your order has been sent to the restaurant.</p>
  <p>Order ID:</p>
  <div class="order-id" id="success-order-id">#----</div>
  <p style="color:var(--text3);font-size:0.82rem;">Please wait, staff will confirm shortly.</p>
  <button class="new-order-btn" onclick="resetApp()">+ New Order</button>
</div>
 
<script>
// ── State ──────────────────────────────────────────────────────────────────
let menu = [], categories = [], cart = [], settings = {};
let currentCat = 'all';
let selectedTable = null;   // null = takeaway, number = table number
let tableCount = 10;
const curr = () => settings.currency || '₹';
 
// Cache for lazily-loaded item images: { [id]: dataURL | null }
const imageCache = {};
 
// ── Fetch data ─────────────────────────────────────────────────────────────
async function loadData() {
  const grid = document.getElementById('menu-grid');
  grid.innerHTML = '<div class="empty"><div class="e-icon">&#x23F3;</div><p>Loading menu...</p></div>';
  try {
    const [menuHttpRes, settingsHttpRes] = await Promise.all([
      fetch('/api/menu'),
      fetch('/api/settings')
    ]);
    if (!menuHttpRes.ok) throw new Error('Menu request failed: HTTP ' + menuHttpRes.status);
    if (!settingsHttpRes.ok) throw new Error('Settings request failed: HTTP ' + settingsHttpRes.status);
 
    const mRes = await menuHttpRes.json();
    const sRes = await settingsHttpRes.json();
 
    if (mRes.ok && Array.isArray(mRes.menu)) {
      menu = mRes.menu;
      categories = Array.isArray(mRes.categories) && mRes.categories.length > 0
        ? mRes.categories
        : deriveCategoriesFromMenu(mRes.menu);
    } else {
      throw new Error(mRes.error || 'Menu data missing from server response');
    }
    if (sRes.ok) {
      settings = sRes;
      tableCount = sRes.tableCount || 10;
      document.getElementById('brand-name').textContent = sRes.restaurantName || 'Restaurant';
      document.title = sRes.restaurantName || 'Order Online';
    }
    if (menu.length === 0) {
      grid.innerHTML = '<div class="empty"><div class="e-icon">🍽️</div>'
        + '<p>Menu is not set up yet.</p>'
        + '<p style="font-size:0.75rem;margin-top:4px;color:var(--text3)">Please add items in the POS app first.</p>'
        + '<button onclick="loadData()" style="margin-top:12px;padding:8px 20px;border-radius:20px;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-weight:700;cursor:pointer;font-size:0.85rem">&#x1F504; Retry</button></div>';
      return;
    }
    renderCategories();
    renderMenu();
  } catch (e) {
    console.error('Load failed:', e);
    grid.innerHTML = '<div class="empty"><div class="e-icon">&#x26A0;&#xFE0F;</div><p>Could not load menu.</p>'
      + '<p style="font-size:0.75rem;margin-top:4px;color:var(--text3)">' + e.message + '</p>'
      + '<button onclick="loadData()" style="margin-top:12px;padding:8px 20px;border-radius:20px;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-weight:700;cursor:pointer;font-size:0.85rem">&#x1F504; Retry</button></div>';
  }
}
 
// ── Categories ─────────────────────────────────────────────────────────────
function deriveCategoriesFromMenu(items) {
  const seen = new Map();
  for (const item of items) {
    if (item.category && !seen.has(String(item.category))) {
      seen.set(String(item.category), {
        id:   String(item.category),
        name: String(item.category).replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
        icon: '🍽️'
      });
    }
  }
  return Array.from(seen.values());
}

function renderCategories() {
  const row = document.getElementById('cat-row');
  const all = [{ id: 'all', name: 'All', icon: '📋' }, ...categories];
  row.innerHTML = all.map(c => `
    <div class="cat-chip ${c.id === currentCat ? 'active' : ''}" onclick="selectCat('${c.id}')">
      ${c.icon} ${c.name}
    </div>`).join('');
}
 
function selectCat(id) {
  currentCat = id;
  const chips = document.querySelectorAll('.cat-chip');
  const all = [{ id: 'all' }, ...categories];
  chips.forEach((ch, i) => ch.classList.toggle('active', all[i].id === id));
  const name = id === 'all' ? 'All Items' : (categories.find(c => c.id === id)?.name || id);
  document.getElementById('section-title').textContent = name;
  renderMenu();
}
 
// ── Menu ───────────────────────────────────────────────────────────────────
function renderMenu() {
  const grid  = document.getElementById('menu-grid');
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  let items   = menu;
  if (currentCat !== 'all') items = items.filter(i => String(i.category) === String(currentCat));
  if (query) items = items.filter(i => i.name.toLowerCase().includes(query));
 
  if (!items.length) {
    const hasQuery = document.getElementById('search-input').value.trim();
    const icon = hasQuery ? '&#x1F50D;' : '&#x1F50D;';
    const msg  = hasQuery ? 'No items match your search' : 'No items in this category';
    grid.innerHTML = '<div class="empty"><div class="e-icon">' + icon + '</div><p>' + msg + '</p></div>';
    return;
  }
  grid.innerHTML = items.map(item => {
    const qty = cart.find(c => c.id === item.id)?.qty || 0;
    // Use cached image if available; otherwise show emoji placeholder and lazy-load
    let img;
    if (imageCache[item.id]) {
      img = `<img class="card-img" src="${imageCache[item.id]}" alt="${item.name}">`;
    } else if (item.hasImage) {
      img = `<div class="card-img-ph" id="imgph-${item.id}">${item.image || '🍽️'}</div>`;
    } else {
      img = `<div class="card-img-ph">${item.image || '🍽️'}</div>`;
    }
    return `
    <div class="food-card ${qty > 0 ? 'in-cart' : ''}">
      <div onclick="addItem(${item.id})">${img}</div>
      <div class="card-body" onclick="addItem(${item.id})">
        <div class="card-name">${item.name}</div>
        <div class="card-price">${curr()}${item.price.toFixed(2)}</div>
      </div>
      <div class="card-qty">
        <button class="qty-btn minus" onclick="adj(${item.id},-1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn plus" onclick="adj(${item.id},+1)">+</button>
      </div>
    </div>`;
  }).join('');
 
  // Lazy-load images for visible items that have one
  items.filter(i => i.hasImage && !imageCache[i.id]).forEach(item => {
    fetch(`/api/menu/image/${item.id}`)
      .then(r => r.json())
      .then(d => {
        if (d.ok && d.imageData) {
          imageCache[item.id] = d.imageData;
          const ph = document.getElementById('imgph-' + item.id);
          if (ph) ph.outerHTML = `<img class="card-img" src="${d.imageData}" alt="">`;
        }
      })
      .catch(() => {}); // silently ignore — emoji placeholder remains
  });
}
 
function addItem(id) {
  const item = menu.find(m => m.id === id);
  if (!item) return;
  if (!cart.find(c => c.id === id)) {
    cart.push({ id: item.id, name: item.name, price: item.price, qty: 1,
                image: item.image, imageData: item.imageData });
  }
  renderMenu();
  updateCartBadge();
}
 
function adj(id, delta) {
  const item = menu.find(m => m.id === id);
  if (!item) return;
  const i = cart.findIndex(c => c.id === id);
  if (i === -1) {
    if (delta > 0) cart.push({ id: item.id, name: item.name, price: item.price, qty: 1,
                                image: item.image, imageData: item.imageData });
  } else {
    cart[i].qty += delta;
    if (cart[i].qty <= 0) cart.splice(i, 1);
  }
  renderMenu();
  updateCartBadge();
  if (document.getElementById('cart-drawer').classList.contains('open')) renderCartDrawer();
}
 
function updateCartBadge() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cart-count').textContent = total;
}
 
// ── Cart Drawer ─────────────────────────────────────────────────────────────
function openCart() {
  renderCartDrawer();
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeCart() {
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
 
function renderCartDrawer() {
  const body = document.getElementById('drawer-body');
  const footer = document.getElementById('drawer-footer');
  if (!cart.length) {
    body.innerHTML = `
      <div class="empty" style="padding:2rem 0">
        <div class="e-icon">🛒</div><p>Cart is empty</p>
      </div>`;
    footer.style.display = 'none';
    footer.innerHTML = '';
    return;
  }
 
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const items_html = cart.map(item => {
    const thumb = item.imageData
      ? `<img src="${item.imageData}">`
      : item.image || '🍽️';
    return `
    <div class="cart-row">
      <div class="cart-thumb">${item.imageData ? `<img src="${item.imageData}">` : item.image || '🍽️'}</div>
      <div class="cart-info">
        <div class="cart-name">${item.name}</div>
        <div class="cart-price">${curr()}${item.price.toFixed(2)} each</div>
      </div>
      <div class="cart-adj">
        <button class="cadj-btn minus" onclick="adj(${item.id},-1)">−</button>
        <span class="cadj-num">${item.qty}</span>
        <button class="cadj-btn plus" onclick="adj(${item.id},+1)">+</button>
      </div>
    </div>`;
  }).join('');
 
  body.innerHTML = `
    ${items_html}
    <div class="total-bar">
      <div class="total-row grand">
        <span>Total</span>
        <span>${curr()}${subtotal.toFixed(2)}</span>
      </div>
    </div>`;

  footer.style.display = 'block';
  footer.innerHTML = `
    <div class="form-section" style="padding:0;border-top:none">
      <h3>Your Details</h3>
      <div class="form-field" style="margin-bottom:10px">
        <label>Your Name</label>
        <input id="cust-name" type="text" placeholder="e.g. Rahul" maxlength="50">
      </div>
      <div class="table-picker-wrap">
        <span class="table-picker-label">Select Table</span>
        <div class="table-grid-picker" id="table-grid-picker">
          ${Array.from({length: tableCount}, (_, i) => i + 1).map(n => `
            <button class="tbl-btn${selectedTable === n ? ' selected' : ''}" onclick="pickTable(${n})">T${n}</button>
          `).join('')}
          <button class="tbl-btn tbl-takeaway${selectedTable === 0 ? ' selected' : ''}" onclick="pickTable(0)">🛍️ Takeaway</button>
        </div>
      </div>
      <div class="form-field" style="margin-bottom:14px">
        <label>Special Note (optional)</label>
        <textarea id="cust-note" rows="2" placeholder="e.g. No spice, extra sauce…"></textarea>
      </div>
      <button class="place-btn" id="place-btn" onclick="placeOrder()">
        ✅ Place Order · ${curr()}${subtotal.toFixed(2)}
      </button>
    </div>`;
}

 
// ── Table Picker ────────────────────────────────────────────────────────────
function pickTable(n) {
  selectedTable = n;
  // Update button highlight without re-rendering full footer
  document.querySelectorAll('.tbl-btn').forEach(btn => btn.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

// ── Place Order ─────────────────────────────────────────────────────────────
async function placeOrder() {
  if (!cart.length) return;
  if (selectedTable === null) {
    alert('Please select a table or Takeaway before placing your order.');
    return;
  }
  const btn = document.getElementById('place-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Sending…';
  const customer = (document.getElementById('cust-name')?.value || '').trim();
  const table_no = selectedTable === 0 ? 'takeaway' : String(selectedTable);
  const note     = (document.getElementById('cust-note')?.value || '').trim();
  const items    = cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty }));

  try {
    const res = await fetch('/api/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items, customer, table_no, note })
    });
    const data = await res.json();
    if (data.ok) {
      showSuccess(data.order_id);
    } else {
      alert('Order failed: ' + (data.error || 'Unknown error'));
      btn.disabled = false;
      btn.textContent = '✅ Place Order';
    }
  } catch (e) {
    alert('Network error. Please try again.');
    btn.disabled = false;
    btn.textContent = '✅ Place Order';
  }
}
 
function showSuccess(orderId) {
  closeCart();
  document.getElementById('success-order-id').textContent = '#' + orderId;
  document.getElementById('success-screen').classList.add('show');
}
 
function resetApp() {
  cart = [];
  selectedTable = null;
  updateCartBadge();
  renderMenu();
  document.getElementById('success-screen').classList.remove('show');
}
 
// ── Boot ────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
